<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>жҷәжңҚAIе®ўжңҚе·ҘдҪңеҸ?/title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-light.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon"><i class="fas fa-headset"></i></div>
                <div class="brand-copy">
                    <h2>жҷәжңҚAI</h2>
                    <p>Customer Service Copilot</p>
                </div>
            </div>
            <div class="workspace-card">
                <div class="workspace-label">еҪ“еүҚе·ҘдҪңеҸ?/div>
                <div class="workspace-title">е”®еүҚдёҺе”®еҗҺз»ҹдёҖжңҚеҠЎеҸ?/div>
                <div class="workspace-metrics">
                    <div class="metric-item">
                        <strong>98.6%</strong>
                        <span>SLA иҫҫжҲҗ</span>
                    </div>
                    <div class="metric-item">
                        <strong>12s</strong>
                        <span>е№іеқҮйҰ–е“Қ</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button @click="handleNewChat" :class="['nav-btn', {active: activeNav === 'newChat'}]">
                    <i class="fas fa-comments"></i> ж–°е»әе’ЁиҜў
                </button>
                <button @click="handleHistory" :class="['nav-btn', {active: activeNav === 'history'}]">
                    <i class="fas fa-clock-rotate-left"></i> дјҡиҜқдёӯеҝғ
                </button>
                <button @click="handleKnowledgeBase" :class="['nav-btn', {active: activeNav === 'knowledge'}]">
                    <i :class="isAdmin ? 'fas fa-database' : 'fas fa-lock'"></i> {{ isAdmin ? 'зҹҘиҜҶеә“з®Ўзҗ? : 'зҹҘиҜҶеә“з®ЎзҗҶпјҲз®ЎзҗҶе‘ҳпјү' }}
                </button>
                <button @click="handleSkillCenter" :class="['nav-btn', {active: activeNav === 'skills'}]">
                    <i :class="isAdmin ? 'fas fa-wand-magic-sparkles' : 'fas fa-lock'"></i> {{ isAdmin ? 'Skillз®ЎзҗҶ' : 'Skillз®ЎзҗҶпјҲз®ЎзҗҶе‘ҳпј? }}
                </button>
                <button @click="handleMcpCenter" :class="['nav-btn', {active: activeNav === 'mcp'}]">
                    <i :class="isAdmin ? 'fas fa-plug-circle-bolt' : 'fas fa-lock'"></i> {{ isAdmin ? 'MCPз®ЎзҗҶ' : 'MCPз®ЎзҗҶпјҲз®ЎзҗҶе‘ҳпј? }}
                </button>
            </nav>
            <div class="sidebar-section">
                <div class="section-title">иғҪеҠӣиҢғеӣҙ</div>
                <div class="capability-list">
                    <div class="capability-item"><i class="fas fa-bolt"></i><span>е®һж—¶еә”зӯ”</span></div>
                    <div class="capability-item"><i class="fas fa-book-open"></i><span>зҹҘиҜҶеә“жЈҖзҙ?/span></div>
                    <div class="capability-item"><i class="fas fa-chart-line"></i><span>жңҚеҠЎж•°жҚ®жҙһеҜҹ</span></div>
                </div>
            </div>
            <div class="sidebar-footer">
                <button @click="handleClearChat" class="danger-btn">
                    <i class="fas fa-trash-alt"></i> жё…з©әеҪ“еүҚдјҡиҜқ
                </button>
                <button v-if="isAuthenticated" @click="handleLogout" class="danger-btn logout-btn">
                    <i class="fas fa-right-from-bracket"></i> йҖҖеҮәе·ҘдҪңеҸ°
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-content">
            <!-- Settings Panel -->
            <div v-if="isAuthenticated && isAdmin && activeNav === 'knowledge'" class="settings-panel">
                <div class="settings-header">
                    <div class="panel-badge">Admin Console</div>
                    <h2><i class="fas fa-database"></i> зҹҘиҜҶеә“з®Ўзҗ?/h2>
                    <p>дёҠдј дёҡеҠЎиө„ж–ҷгҖҒSOPгҖҒдә§е“ҒиҜҙжҳҺе’Ңеёёи§Ғй—®йўҳж–ҮжЎЈпјҢи®©жҷәиғҪе®ўжңҚеӣһзӯ”жӣҙзЁіе®ҡгҖҒжӣҙиҙҙиҝ‘дёҡеҠЎеңәжҷҜгҖ?/p>
                </div>

                <div class="upload-section">
                    <h3><i class="fas fa-upload"></i> дёҠдј ж–ҮжЎЈ</h3>
                    <div class="upload-area">
                        <input 
                            type="file" 
                            ref="fileInput" 
                            @change="handleFileSelect"
                            accept=".pdf,.doc,.docx,.xls,.xlsx"
                            style="display: none"
                        />
                        <button @click="$refs.fileInput.click()" class="upload-btn">
                            <i class="fas fa-cloud-upload-alt"></i> йҖүжӢ©ж–Үд»¶
                        </button>
                        <div v-if="selectedFile" class="selected-file">
                            <i class="fas fa-file"></i> {{ selectedFile.name }}
                            <button @click="uploadDocument" class="btn-primary" :disabled="isUploading">
                                <i class="fas fa-upload"></i> {{ isUploading ? 'дёҠдј дё?..' : 'ејҖе§ӢдёҠдј? }}
                            </button>
                        </div>
                        <div v-if="uploadSteps.length" class="upload-progress" :class="{ collapsed: uploadProgressCollapsed }">
                            <button type="button" class="upload-progress-header" @click="toggleUploadProgressCollapsed">
                                <span v-if="uploadProgress" class="upload-message">{{ uploadProgress }}</span>
                                <span v-else class="upload-message">дёҠдј иҝӣеәҰ</span>
                                <span class="upload-toggle">{{ uploadProgressCollapsed ? 'еұ•ејҖ' : 'ж”¶иө·' }}</span>
                            </button>
                            <div v-show="!uploadProgressCollapsed" class="upload-step-list">
                                <div
                                    v-for="step in uploadSteps"
                                    :key="step.key"
                                    class="upload-step"
                                    :class="`upload-step-${step.status}`"
                                >
                                    <div class="upload-step-header">
                                        <span class="upload-step-label">{{ step.label }}</span>
                                        <span class="upload-step-percent">{{ step.percent }}%</span>
                                    </div>
                                    <div class="upload-step-bar">
                                        <div class="upload-step-fill" :style="{ width: step.percent + '%' }"></div>
                                    </div>
                                    <div v-if="step.message" class="upload-step-message">{{ step.message }}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <div v-if="isAuthenticated && isAdmin && activeNav === 'skills'" class="settings-panel">
                <div class="settings-header">
                    <div class="panel-badge">Admin Console</div>
                    <h2><i class="fas fa-wand-magic-sparkles"></i> Skillз®ЎзҗҶ</h2>
                    <p>дёҠдј е®ўжңҚжҠҖиғҪzipеҢ…пјҢеҜје…ҘеҗҺеҚіеҸҜиў«agentеҸ‘зҺ°е№¶жҢүйңҖеҠ иҪҪпјҢи®©иҝҗиЎҢж—¶иғҪеҠӣд»ҘжЁЎеқ—еҢ–ж–№ејҸжү©еұ•гҖ?/p>
                </div>

                <div class="skills-section">
                    <div class="skills-section-header">
                        <div>
                            <h3><i class="fas fa-wand-magic-sparkles"></i> Skill з®ЎзҗҶ</h3>
                            <p>дёҠдј е®ўжңҚжҠҖиғҪzipеҢ…пјҢеҜје…ҘеҗҺеҸҜз«ӢеҚіиў«agentеҸ‘зҺ°е№¶жҢүйңҖеҠ иҪҪгҖ?/p>
                        </div>
                        <button @click="loadSkills" class="btn-secondary">
                            <i class="fas fa-sync"></i> еҲ·ж–°Skill
                        </button>
                    </div>

                    <div class="upload-area skill-upload-area">
                        <input
                            type="file"
                            ref="skillFileInput"
                            @change="handleSkillFileSelect"
                            accept=".zip"
                            style="display: none"
                        />
                        <button @click="$refs.skillFileInput.click()" class="upload-btn">
                            <i class="fas fa-file-zipper"></i> йҖүжӢ©SkillеҺӢзј©еҢ?                        </button>
                        <div v-if="selectedSkillFile" class="selected-file skill-selected-file">
                            <div class="selected-file-main">
                                <i class="fas fa-box-archive"></i> {{ selectedSkillFile.name }}
                            </div>
                            <button @click="uploadSkill" class="btn-primary" :disabled="isSkillUploading">
                                <i class="fas fa-upload"></i> {{ isSkillUploading ? 'еҜје…Ҙдё?..' : 'еҜје…ҘSkill' }}
                            </button>
                        </div>
                        <div v-if="skillUploadMessage" class="skill-upload-message" :class="skillUploadStatusClass">
                            {{ skillUploadMessage }}
                        </div>
                    </div>

                    <div v-if="skillsLoading" class="loading-indicator">
                        жӯЈеңЁеҠ иҪҪSkillеҲ—иЎЁ...
                    </div>

                    <div v-else-if="skills.length === 0" class="empty-documents">
                        <i class="fas fa-box-open"></i>
                        <p>жҡӮж— е·Іе®үиЈ…Skill</p>
                    </div>

                    <div v-else class="skills-list">
                        <div v-for="skill in skills" :key="skill.folder_name" class="skill-item">
                            <div class="skill-item-header">
                                <div>
                                    <div class="skill-name">{{ skill.name }}</div>
                                    <div class="skill-folder">зӣ®еҪ•пјҡ{{ skill.folder_name }} / е…ҘеҸЈпјҡ{{ skill.entry_file }}</div>
                                </div>
                                <div class="skill-resource-count">{{ skill.resources.length }} дёӘиө„жә?/div>
                            </div>
                            <div class="skill-description">{{ skill.description }}</div>
                            <div v-if="skill.resources.length" class="skill-resources">
                                <span v-for="resource in skill.resources" :key="resource" class="skill-resource-chip">
                                    {{ resource }}
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="isAuthenticated && isAdmin && activeNav === 'mcp'" class="settings-panel">
                <div class="settings-header">
                    <div class="panel-badge">Admin Console</div>
                    <h2><i class="fas fa-plug-circle-bolt"></i> MCPз®ЎзҗҶ</h2>
                    <p>й…ҚзҪ® agent еҸҜи°ғз”Ёзҡ„еӨ–йғЁ MCP ServerпјҢж”ҜжҢҒжң¬ең?stdio жЁЎејҸе’ҢиҝңзЁ?streamable-http жЁЎејҸгҖ?/p>
                </div>

                <div class="mcp-layout">
                    <section class="mcp-form-card">
                        <div class="skills-section-header">
                            <div>
                                <h3><i class="fas fa-sliders"></i> {{ mcpFormMode === 'create' ? 'ж–°еўһ MCP й…ҚзҪ®' : 'зј–иҫ‘ MCP й…ҚзҪ®' }}</h3>
                                <p>stdio ж”ҜжҢҒдёҠдј и„ҡжң¬жҲ?zip еҢ…пјҢHTTP жЁЎејҸеҸҜй…ҚзҪ?URL дёҺиҜ·жұӮеӨҙгҖ?/p>
                            </div>
                            <button @click="resetMcpForm()" class="btn-secondary">
                                <i class="fas fa-rotate"></i> йҮҚзҪ®иЎЁеҚ•
                            </button>
                        </div>

                        <div class="mcp-form-grid">
                            <label class="mcp-field">
                                <span>еҗҚз§°</span>
                                <input v-model="mcpForm.name" type="text" placeholder="дҫӢеҰӮпјҡweather-http / local-filesystem" />
                            </label>

                            <label class="mcp-field">
                                <span>дј иҫ“ж–№ејҸ</span>
                                <select v-model="mcpForm.transport">
                                    <option value="stdio">stdio</option>
                                    <option value="http">streamable-http</option>
                                </select>
                            </label>

                            <label class="mcp-field">
                                <span>еҗҜз”ЁзҠ¶жҖ?/span>
                                <select v-model="mcpForm.enabled">
                                    <option :value="true">еҗҜз”Ё</option>
                                    <option :value="false">еҒңз”Ё</option>
                                </select>
                            </label>

                            <label class="mcp-field mcp-field-full">
                                <span>жҸҸиҝ°</span>
                                <textarea v-model="mcpForm.description" rows="2" placeholder="иҜҙжҳҺиҝҷдёӘ MCP Server жҸҗдҫӣд»Җд№ҲиғҪеҠ?></textarea>
                            </label>

                            <template v-if="mcpForm.transport === 'stdio'">
                                <label class="mcp-field">
                                    <span>command</span>
                                    <input v-model="mcpForm.command" type="text" placeholder="дҫӢеҰӮпјҡpython / node / uvx" />
                                </label>

                                <label class="mcp-field">
                                    <span>иө„жәҗж–Үд»¶</span>
                                    <div class="mcp-file-row">
                                        <input
                                            type="file"
                                            ref="mcpFileInput"
                                            @change="handleMcpFileSelect"
                                            accept=".zip,.py,.js,.mjs,.exe,.bat,.cmd"
                                        />
                                        <div v-if="selectedMcpFile" class="selected-file-inline">{{ selectedMcpFile.name }}</div>
                                    </div>
                                </label>

                                <label class="mcp-field mcp-field-full">
                                    <span>args_json</span>
                                    <textarea v-model="mcpForm.args_json" rows="4" placeholder='дҫӢеҰӮпјҡ["{asset_dir}\\server.py"]'></textarea>
                                </label>

                                <label class="mcp-field mcp-field-full">
                                    <span>env_json</span>
                                    <textarea v-model="mcpForm.env_json" rows="4" placeholder='дҫӢеҰӮпјҡ{"PYTHONUTF8":"1"}'></textarea>
                                </label>

                                <div class="mcp-hint mcp-field-full">
                                    еҸҜз”ЁеҚ дҪҚз¬Ұпјҡ`{asset_dir}`гҖҒ`{asset_path}`гҖҒ`{config_name}`гҖҒ`{config_id}`гҖ?                                    дёҠдј  zip ж—¶йҖҡеёёдҪҝз”Ё `{asset_dir}`пјӣдёҠдј еҚ•ж–Үд»¶ж—¶йҖҡеёёдҪҝз”Ё `{asset_path}`гҖ?                                </div>
                            </template>

                            <template v-else>
                                <label class="mcp-field mcp-field-full">
                                    <span>URL</span>
                                    <input v-model="mcpForm.url" type="text" placeholder="дҫӢеҰӮпјҡhttps://example.com/mcp" />
                                </label>

                                <label class="mcp-field mcp-field-full">
                                    <span>headers_json</span>
                                    <textarea v-model="mcpForm.headers_json" rows="5" placeholder='дҫӢеҰӮпјҡ{"Authorization":"Bearer xxx"}'></textarea>
                                </label>
                            </template>
                        </div>

                        <div class="mcp-form-actions">
                            <button @click="submitMcpServer" class="btn-primary" :disabled="isMcpSubmitting">
                                <i class="fas fa-floppy-disk"></i>
                                {{ isMcpSubmitting ? 'жҸҗдәӨдё?..' : (mcpFormMode === 'create' ? 'еҲӣе»әй…ҚзҪ®' : 'дҝқеӯҳдҝ®ж”№') }}
                            </button>
                        </div>

                        <div v-if="mcpFormMessage" class="skill-upload-message" :class="mcpFormStatusClass">
                            {{ mcpFormMessage }}
                        </div>
                    </section>

                    <section class="mcp-list-card">
                        <div class="skills-section-header">
                            <div>
                                <h3><i class="fas fa-server"></i> MCP й…ҚзҪ®еҲ—иЎЁ</h3>
                                <p>еҗҜз”ЁеҗҺзҡ„й…ҚзҪ®дјҡиў« agent иҮӘеҠЁеҸ‘зҺ°е№¶е№¶е…ҘиҝҗиЎҢж—¶е·Ҙе…·гҖ?/p>
                            </div>
                            <button @click="loadMcpServers" class="btn-secondary">
                                <i class="fas fa-sync"></i> еҲ·ж–°й…ҚзҪ®
                            </button>
                        </div>

                        <div v-if="mcpLoading" class="loading-indicator">жӯЈеңЁеҠ иҪҪ MCP й…ҚзҪ®...</div>
                        <div v-else-if="mcpServers.length === 0" class="empty-documents">
                            <i class="fas fa-plug-circle-xmark"></i>
                            <p>жҡӮж—  MCP й…ҚзҪ®</p>
                        </div>
                        <div v-else class="mcp-server-list">
                            <div v-for="server in mcpServers" :key="server.id" class="mcp-server-item">
                                <div class="mcp-server-header">
                                    <div>
                                        <div class="skill-name">{{ server.name }}</div>
                                        <div class="skill-folder">
                                            {{ server.transport }} В· {{ server.enabled ? 'е·ІеҗҜз”? : 'е·ІеҒңз”? }}
                                            <span v-if="server.created_by"> В· еҲӣе»әдәәпјҡ{{ server.created_by }}</span>
                                        </div>
                                    </div>
                                    <div class="mcp-server-actions">
                                        <button @click="editMcpServer(server)" class="btn-secondary btn-small">
                                            <i class="fas fa-pen"></i> зј–иҫ‘
                                        </button>
                                        <button @click="deleteMcpServer(server)" class="danger-btn danger-btn-inline">
                                            <i class="fas fa-trash"></i> еҲ йҷӨ
                                        </button>
                                    </div>
                                </div>
                                <div class="skill-description">{{ server.description || 'жҡӮж— жҸҸиҝ°' }}</div>
                                <div class="mcp-meta-list">
                                    <div v-if="server.transport === 'stdio'" class="mcp-meta-item">
                                        <strong>command:</strong> {{ server.command || '-' }}
                                    </div>
                                    <div v-if="server.transport === 'stdio'" class="mcp-meta-item">
                                        <strong>args:</strong> {{ JSON.stringify(server.args_json || []) }}
                                    </div>
                                    <div v-if="server.transport === 'stdio' && server.uploaded_filename" class="mcp-meta-item">
                                        <strong>иө„жәҗж–Үд»¶:</strong> {{ server.uploaded_filename }}
                                    </div>
                                    <div v-if="server.transport === 'http'" class="mcp-meta-item">
                                        <strong>url:</strong> {{ server.url || '-' }}
                                    </div>
                                    <div v-if="server.transport === 'http' && Object.keys(server.headers_json || {}).length" class="mcp-meta-item">
                                        <strong>headers:</strong> {{ JSON.stringify(server.headers_json || {}) }}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <div v-if="isAuthenticated && isAdmin && activeNav === 'knowledge'" class="settings-panel settings-panel-secondary">
                <div class="documents-section">
                    <h3><i class="fas fa-list"></i> е·ІдёҠдј ж–ҮжЎ?/h3>
                    <button @click="loadDocuments" class="btn-secondary">
                        <i class="fas fa-sync"></i> еҲ·ж–°еҲ—иЎЁ
                    </button>
                    
                    <div v-if="documentsLoading" class="loading-indicator">
                        еҠ иҪҪдё?..
                    </div>
                    
                    <div v-else-if="documents.length === 0" class="empty-documents">
                        <i class="fas fa-inbox"></i>
                        <p>жҡӮж— ж–ҮжЎЈ</p>
                    </div>
                    
                    <div v-else class="documents-list">
                        <div 
                            v-for="doc in documents" 
                            :key="doc.filename"
                            class="document-item"
                            :class="{ deleting: deleteJobs[doc.filename]?.status === 'running' }"
                        >
                            <div class="document-main">
                                <div class="document-row">
                                    <div class="document-info">
                                        <div class="document-icon">
                                            <i :class="getFileIcon(doc.file_type)"></i>
                                        </div>
                                        <div class="document-details">
                                            <div class="document-name">{{ doc.filename }}</div>
                                            <div class="document-meta">
                                                <span>{{ doc.file_type }}</span>
                                                <span>{{ doc.chunk_count }} дёӘж–Үжң¬зүҮж®?/span>
                                            </div>
                                        </div>
                                    </div>
                                    <button 
                                        @click="deleteDocument(doc.filename)" 
                                        class="btn-danger"
                                        title="еҲ йҷӨж–ҮжЎЈ"
                                        :disabled="isDeleteActionLocked(doc.filename)"
                                    >
                                        <i :class="getDeleteButtonIcon(doc.filename)"></i>
                                    </button>
                                </div>

                                <div
                                    v-if="deleteJobs[doc.filename]"
                                    class="upload-progress delete-progress"
                                    :class="{ collapsed: deleteJobs[doc.filename].collapsed }"
                                >
                                    <button type="button" class="upload-progress-header" @click="toggleDeleteJobCollapsed(doc.filename)">
                                        <span class="upload-message">{{ deleteJobs[doc.filename].message || 'еҲ йҷӨиҝӣеәҰ' }}</span>
                                        <span class="upload-toggle">{{ deleteJobs[doc.filename].collapsed ? 'еұ•ејҖ' : 'ж”¶иө·' }}</span>
                                    </button>
                                    <div v-show="!deleteJobs[doc.filename].collapsed" class="upload-step-list">
                                        <div
                                            v-for="step in deleteJobs[doc.filename].steps"
                                            :key="step.key"
                                            class="upload-step"
                                            :class="`upload-step-${step.status}`"
